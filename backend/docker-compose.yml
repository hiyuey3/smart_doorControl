version: '3.8'

services:
  # Flask 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doorcontrol_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # 持久化数据库
      - ./instance:/app/instance
      # 持久化日志
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me}
      - MQTT_BROKER=mqtt.5i03.cn
      - MQTT_PORT=1883
      # 云端中继视频配置（可选）
      # 配置此项以使用云端中继地址而非本地ESP32
      # 示例：'https://relay.example.com/snapshot' 或 'http://210.1.1.1:8080/snapshot'
      - CLOUD_RELAY_SNAPSHOT_URL=${CLOUD_RELAY_SNAPSHOT_URL:-}
      # 本地ESP32地址（云端中继不可用时的备选方案）
      - DEVICE_SNAPSHOT_URL=${DEVICE_SNAPSHOT_URL:-http://192.168.3.161:81/stream?action=snapshot}
    networks:
      - doorcontrol_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选，用于 HTTPS）
  nginx:
    image: nginx:alpine
    container_name: doorcontrol_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - doorcontrol_network

networks:
  doorcontrol_network:
    driver: bridge
