version: '3.8'

services:
  # Flask 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doorcontrol_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # 持久化数据库
      - ./instance:/app/instance
      # 持久化日志
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me}
      - MQTT_BROKER=mqtt.5i03.cn
      - MQTT_PORT=1883
    networks:
      - doorcontrol_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选，用于 HTTPS）
  nginx:
    image: nginx:alpine
    container_name: doorcontrol_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
    networks:
      - doorcontrol_network

networks:
  doorcontrol_network:
    driver: bridge
